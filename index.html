/* ===== ANIMASI OPENING BATIK MEGA MENDUNG ===== */
.opening-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a1a2c; /* navy deep */
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: openingFade 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    pointer-events: none;
}

.batik-opening {
    position: relative;
    width: 300px;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: openingSpin 1.8s ease-out forwards;
}

.batik-opening svg {
    width: 200px;
    height: 200px;
    animation: openingPulse 1.4s infinite alternate;
}

.opening-text {
    color: #f5efe6;
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 8px;
    margin-top: 40px;
    opacity: 0;
    animation: textAppear 1s 0.6s forwards;
    text-shadow: 0 0 20px #b6aa99;
    font-family: 'Courier New', monospace;
}

.opening-sub {
    color: #cbbcaa;
    font-size: 1rem;
    letter-spacing: 4px;
    margin-top: 12px;
    opacity: 0;
    animation: textAppear 1s 0.9s forwards;
    font-family: 'Courier New', monospace;
}

.opening-pattern {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(circle at 30% 40%, #1e3a5f 8px, transparent 8px),
        radial-gradient(circle at 70% 60%, #1e3a5f 12px, transparent 12px),
        radial-gradient(circle at 20% 80%, #b6aa99 6px, transparent 6px),
        radial-gradient(circle at 80% 20%, #b6aa99 10px, transparent 10px),
        radial-gradient(circle at 50% 30%, #1e3a5f 14px, transparent 14px);
    background-size: 200px 200px;
    opacity: 0.2;
    animation: patternMove 2s linear infinite;
}

@keyframes openingFade {
    0% { opacity: 1; visibility: visible; }
    70% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}

@keyframes openingSpin {
    0% { transform: scale(0.2) rotate(-30deg); opacity: 0; }
    30% { transform: scale(1.1) rotate(5deg); opacity: 1; }
    60% { transform: scale(0.95) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

@keyframes openingPulse {
    0% { transform: scale(1); filter: drop-shadow(0 0 5px #b6aa99); }
    100% { transform: scale(1.05); filter: drop-shadow(0 0 25px #cbbcaa); }
}

@keyframes textAppear {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
}

@keyframes patternMove {
    0% { background-position: 0 0; }
    100% { background-position: 200px 200px; }

<script>
// BINTANG GALAXY - warna-warni
const starsContainer = document.getElementById('stars');
const colors = ['purple', 'cyan', 'pink', ''];

for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    const colorClass = colors[Math.floor(Math.random() * colors.length)];
    star.className = 'star ' + colorClass;
    
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const size = Math.random() * 3 + 1;
    const duration = Math.random() * 5 + 3;
    
    star.style.left = x + '%';
    star.style.top = y + '%';
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.animationDuration = duration + 's';
    star.style.animationDelay = Math.random() * 2 + 's';
    
    starsContainer.appendChild(star);
}

/* PARTICLES - CYBERPUNK */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<80;i++) {
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*4 + 1,
        d:Math.random()*0.4 + 0.1,
        color: i % 3 === 0 ? '#0ff' : (i % 3 === 1 ? '#f0f' : '#7df0ff'),
        opacity: Math.random() * 0.3 + 0.2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 10;
        ctx.globalAlpha = p.opacity;
        ctx.fill();
        
        p.y += p.d;
        if(p.y>canvas.height){
            p.y=0;
            p.x=Math.random()*canvas.width;
        }
    });
    
    requestAnimationFrame(draw);
}
draw();

/* COUNTDOWN */
const target = new Date("March 1, 2026 00:00:00").getTime();
function updateCountdown() {
    const now = new Date().getTime();
    const diff = target - now;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    const el = document.getElementById("countdown");
    el.innerHTML = `
        <span>${d}<span style="font-size:16px; margin-left:4px;">d</span></span>
        <span>${h}<span style="font-size:16px; margin-left:4px;">h</span></span>
        <span>${m}<span style="font-size:16px; margin-left:4px;">m</span></span>
        <span>${s}<span style="font-size:16px; margin-left:4px;">s</span></span>
    `;
}

updateCountdown();
setInterval(updateCountdown, 1000);

/* MOUSE GLOW */
const container = document.querySelector(".container");
container.addEventListener("mousemove", e => {
    const rect = container.getBoundingClientRect();
    container.style.setProperty("--x", e.clientX - rect.left + "px");
    container.style.setProperty("--y", e.clientY - rect.top + "px");
});

/* Efek 3D cyberpunk */
container.addEventListener("mousemove", function(e) {
    const rect = this.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    
    const rotateX = (y - centerY) / 25;
    const rotateY = (centerX - x) / 25;
    
    this.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
});

container.addEventListener("mouseleave", function() {
    this.style.transform = "perspective(1000px) rotateX(0) rotateY(0) scale(1)";
});

/* Efek glitch random */
const glitchTitle = document.getElementById('glitchTitle');
setInterval(() => {
    if(Math.random() > 0.85) {
        glitchTitle.style.transform = 'skew(2deg, 1deg) scale(1.02)';
        glitchTitle.style.filter = 'hue-rotate(90deg)';
        setTimeout(() => {
            glitchTitle.style.transform = 'skew(0, 0) scale(1)';
            glitchTitle.style.filter = 'hue-rotate(0)';
        }, 80);
    }
}, 2000);

/* Resize handler */
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
